<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Reports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

  <div class="bg-blue-800 text-white p-4 flex justify-between items-center md:hidden w-full shadow-md">
    <h1 class="text-xl font-bold"><i class="fa-solid fa-notes-medical mr-2"></i>DocHub</h1>
    <button id="mobileMenuBtn" class="text-2xl focus:outline-none">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <aside id="sidebar" class="bg-white border-r border-gray-200 w-full md:w-80 flex-shrink-0 flex flex-col h-full absolute inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-200 ease-in-out z-30 shadow-lg md:shadow-none">
    
    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
      <div>
        <h2 class="text-2xl font-extrabold text-blue-900 tracking-tight">DocHub</h2>
        <p class="text-xs text-gray-500">Medical Report Directory</p>
      </div>
      <button id="closeMobileMenuBtn" class="text-gray-500 text-xl md:hidden">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="p-4 border-b border-gray-100 bg-blue-50">
      <div id="authSection" class="space-y-3">
        <div id="loggedOutView" class="space-y-2">
          <p class="text-sm text-blue-800 font-medium">Are you a doctor?</p>
          <button onclick="toggleAuthModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded-lg shadow-sm transition">
            <i class="fa-solid fa-user-md mr-1"></i> Doctor Log In / Register
          </button>
        </div>
        <div id="loggedInView" class="hidden space-y-2">
          <p class="text-sm text-gray-700">Welcome, Dr. <span id="currentDoctorName" class="font-bold">...</span></p>
          <button onclick="toggleUploadModal()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold py-2 px-4 rounded-lg shadow-sm transition">
            <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Upload Google Drive URL
          </button>
          <button onclick="logout()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold py-2 px-4 rounded-lg transition mt-1">
            Logout
          </button>
        </div>
      </div>
    </div>

    <div class="p-4 flex-1 overflow-y-auto">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Registered Doctors</h3>
      <ul id="doctorsList" class="space-y-2">
        <li class="text-sm text-gray-500 italic p-3">No doctors registered yet.</li>
      </ul>
    </div>
  </aside>

  <div id="sidebarOverlay" class="fixed inset-0 bg-black opacity-50 z-20 hidden md:hidden"></div>

  <main class="flex-1 flex flex-col h-full overflow-y-auto p-4 md:p-8">
    
    <div class="max-w-4xl mx-auto w-full mb-8">
      <div class="text-center mb-6">
        <h1 class="text-3xl md:text-4xl font-black text-gray-900 mb-2">Search Medical Reports</h1>
        <p class="text-gray-600 text-base md:text-lg">Find documents instantly via secure Google Drive links.</p>
      </div>

      <div class="relative bg-white p-2 rounded-xl border border-gray-200 flex items-center gap-2 shadow-sm focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500">
        <i class="fa-solid fa-search text-gray-400 ml-3"></i>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search by report type, keyword, or doctor name..." 
          class="flex-1 p-3 text-base md:text-lg focus:outline-none bg-transparent"
        />
      </div>
    </div>

    <div class="max-w-4xl mx-auto w-full flex-1">
      <div class="flex justify-between items-center mb-4">
        <h3 id="resultsCount" class="text-sm font-semibold text-gray-500">All Reports</h3>
      </div>

      <div id="reportsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-full text-center py-12 text-gray-400 bg-white border border-gray-200 rounded-xl shadow-sm">
          <i class="fa-solid fa-file-invoice text-4xl mb-2 text-gray-300"></i>
          <p>No reports uploaded yet.</p>
        </div>
      </div>
    </div>
  </main>

  <div id="authModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 relative">
      <button onclick="toggleAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
      <h3 class="text-xl font-extrabold text-blue-900 mb-4">Doctor Registration</h3>
      <form id="authForm" onsubmit="registerDoctor(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Your Full Name</label>
          <input type="text" id="regName" required placeholder="Dr. John Doe" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
          <input type="email" id="regEmail" required placeholder="doctor@hospital.com" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg shadow-sm transition">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <div id="uploadModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 relative">
      <button onclick="toggleUploadModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
      <h3 class="text-xl font-extrabold text-emerald-900 mb-4">Submit New Report URL</h3>
      <form id="uploadForm" onsubmit="uploadReport(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Report Title / Type</label>
          <input type="text" id="reportTitle" required placeholder="e.g., Chest X-Ray, Blood Test" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Google Drive Link</label>
          <input type="url" id="driveUrl" required placeholder="https://drive.google.com/file/d/..." class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg shadow-sm transition">
          Publish Report
        </button>
      </form>
    </div>
  </div>

  <script>
    // Mock Backend Database (Stored in browser LocalStorage for immediate use)
    let doctors = JSON.parse(localStorage.getItem('docHub_doctors')) || [];
    let reports = JSON.parse(localStorage.getItem('docHub_reports')) || [];
    let loggedInDoctor = JSON.parse(localStorage.getItem('docHub_session')) || null;

    // Load static UI data on start
    window.onload = function() {
      updateUI();
      renderDoctors();
      renderReports(reports);

      // Add a bulletproof input listener that catches text on any device
      const searchBox = document.getElementById('searchInput');
      if (searchBox) {
        ['input', 'keyup', 'change'].forEach(evt => {
          searchBox.addEventListener(evt, searchReports);
        });
      }
    };

    // Mobile Sidebar controls
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const closeMobileMenuBtn = document.getElementById('closeMobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    function openMobileMenu() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }

    function closeMobileMenu() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }

    mobileMenuBtn.addEventListener('click', openMobileMenu);
    closeMobileMenuBtn.addEventListener('click', closeMobileMenu);
    overlay.addEventListener('click', closeMobileMenu);

    // Modal Toggles
    function toggleAuthModal() {
      const modal = document.getElementById('authModal');
      modal.classList.toggle('hidden');
    }

    function toggleUploadModal() {
      const modal = document.getElementById('uploadModal');
      modal.classList.toggle('hidden');
    }

    // Auth State Controller
    function updateUI() {
      const loggedOutView = document.getElementById('loggedOutView');
      const loggedInView = document.getElementById('loggedInView');
      const docNameSpan = document.getElementById('currentDoctorName');

      if (loggedInDoctor) {
        loggedOutView.classList.add('hidden');
        loggedInView.classList.remove('hidden');
        docNameSpan.innerText = loggedInDoctor.name;
      } else {
        loggedOutView.classList.remove('hidden');
        loggedInView.classList.add('hidden');
      }
    }

    // Register Account
    function registerDoctor(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();

      // Simple unique email validation
      const existingDoc = doctors.find(d => d.email === email);
      if (existingDoc) {
        loggedInDoctor = existingDoc;
      } else {
        const newDoctor = { id: Date.now().toString(), name, email };
        doctors.push(newDoctor);
        localStorage.setItem('docHub_doctors', JSON.stringify(doctors));
        loggedInDoctor = newDoctor;
      }

      localStorage.setItem('docHub_session', JSON.stringify(loggedInDoctor));
      updateUI();
      renderDoctors();
      toggleAuthModal();
      document.getElementById('authForm').reset();
    }

    // Logout Account
    function logout() {
      loggedInDoctor = null;
      localStorage.removeItem('docHub_session');
      updateUI();
    }

    // Upload a new report
    function uploadReport(e) {
      e.preventDefault();
      if (!loggedInDoctor) return alert('Error: Please log in first');

      const title = document.getElementById('reportTitle').value.trim();
      const driveUrl = document.getElementById('driveUrl').value.trim();

      const newReport = {
        id: Date.now().toString(),
        doctorId: loggedInDoctor.id,
        doctorName: loggedInDoctor.name,
        title,
        driveUrl,
        date: new Date().toLocaleDateString()
      };

      reports.unshift(newReport);
      localStorage.setItem('docHub_reports', JSON.stringify(reports));

      renderReports(reports);
      toggleUploadModal();
      document.getElementById('uploadForm').reset();
    }

    // Render Side Panel List of Doctors
    function renderDoctors() {
      const listContainer = document.getElementById('doctorsList');
      if (doctors.length === 0) {
        listContainer.innerHTML = `<li class="text-sm text-gray-500 italic p-3">No doctors registered yet.</li>`;
        return;
      }

      listContainer.innerHTML = doctors.map(doc => `
        <li class="bg-white border border-gray-100 p-3 rounded-xl flex items-center gap-3 shadow-sm hover:border-blue-200 transition">
          <div class="h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold uppercase">
            ${doc.name.substring(0, 2)}
          </div>
          <div class="overflow-hidden">
            <h4 class="text-sm font-bold text-gray-800 truncate">${doc.name}</h4>
            <p class="text-xs text-gray-500 truncate">${doc.email}</p>
          </div>
        </li>
      `).join('');
    }

    // Render Search Results Grid
    function renderReports(itemsToRender) {
      const reportsContainer = document.getElementById('reportsGrid');
      const countLabel = document.getElementById('resultsCount');

      countLabel.innerText = `${itemsToRender.length} Report(s) available`;

      if (itemsToRender.length === 0) {
        reportsContainer.innerHTML = `
          <div class="col-span-full text-center py-12 text-gray-400 bg-white border border-gray-200 rounded-xl shadow-sm">
            <i class="fa-solid fa-file-circle-exclamation text-4xl mb-2 text-gray-300"></i>
            <p>No reports match your parameters.</p>
          </div>
        `;
        return;
      }

      reportsContainer.innerHTML = itemsToRender.map(item => `
        <div class="bg-white border border-gray-200 p-5 rounded-xl flex flex-col justify-between shadow-sm hover:shadow-md hover:border-blue-300 transition gap-4">
          <div>
            <div class="flex items-start justify-between">
              <span class="text-xs bg-blue-50 text-blue-800 font-bold px-2.5 py-1 rounded-md tracking-wide uppercase">Report</span>
              <span class="text-xs text-gray-400"><i class="fa-solid fa-calendar mr-1"></i> ${item.date}</span>
            </div>
            <h3 class="text-lg font-extrabold text-gray-900 mt-3 truncate">${item.title}</h3>
            <p class="text-sm text-gray-600 mt-1"><i class="fa-solid fa-user-md mr-1 text-blue-500"></i> Added by ${item.doctorName}</p>
          </div>
          <a href="${item.driveUrl}" target="_blank" rel="noopener noreferrer" class="w-full flex items-center justify-center gap-2 bg-blue-50 hover:bg-blue-100 text-blue-800 font-semibold py-2.5 px-4 rounded-lg text-sm transition">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> Open in Google Drive
          </a>
        </div>
      `).join('');
    }

    // Comprehensive search handler
    function searchReports() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      
      if (query === "") {
        renderReports(reports);
        return;
      }

      // Split query into individual keywords
      const searchKeywords = query.split(/\s+/).filter(word => word.length > 0);

      const filtered = reports.filter(item => {
        // Formats text to clear accents (such as matching e with é)
        const normalizeText = (text) => {
          return (text || "")
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");
        };

        const reportTitle = normalizeText(item.title);
        const doctorName = normalizeText(item.doctorName);
        const combinedText = `${reportTitle} ${doctorName}`;

        // Match all terms in typed sequence
        return searchKeywords.every(keyword => {
          const normalizedKeyword = normalizeText(keyword);
          return combinedText.includes(normalizedKeyword);
        });
      });

      renderReports(filtered);
    }
  </script>
</body>
</html>
